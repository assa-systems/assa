window.adminShowDrivers = async function() { const el=document.getElementById('admin-content'); try { const snap=await getDocs(collection(db,'users')); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.role==='driver'); el.innerHTML=`<div class="admin-section-title">Drivers (${docs.length})</div>`+(docs.length===0?'<div class="empty-state">No drivers</div>':docs.map(u=>`<div class="list-item"><div class="list-item-row"><div><div class="list-item-title">${u.name||u.email||'-'}</div><div class="list-item-sub">${u.email||''}</div></div><span class="status-badge badge-pending">DRIVER</span></div></div>`).join('')); } catch(e){ el.innerHTML='<div class="empty-state">Error loading</div>'; } };
window.adminShowBookings = async function() { const el=document.getElementById('admin-content'); try { const snap=await getDocs(collection(db,'ride_requests')); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0)); el.innerHTML=`<div class="admin-section-title">Requests (${docs.length})</div>`+(docs.length===0?'<div class="empty-state">No requests</div>':docs.map(r=>`<div class="list-item"><div class="list-item-row"><div><div class="list-item-title">${r.pickupLocation||''} → ${r.destination||''}</div><div class="list-item-sub">${r.userName||'-'} · ${r.rideType||''} · ${r.platform==='pwa'?'PWA':'App'}${r.shuttleIdFeedback?` · Shuttle: ${r.shuttleIdFeedback}`:''}</div><div class="list-item-sub">${formatTime(r.timestamp)}</div></div>${statusBadge(r.status)}</div><div style="display:flex;gap:0.4rem;margin-top:0.5rem;"><button class="btn btn-success" style="flex:1;padding:0.45rem;background:var(--success);color:white;border:none;border-radius:8px;cursor:pointer;" onclick="updateRequestStatus('${r.id}',1)">Accept</button><button class="btn btn-danger" style="flex:1;padding:0.45rem;background:var(--danger);color:white;border:none;border-radius:8px;cursor:pointer;" onclick="updateRequestStatus('${r.id}',4)">Reject</button></div></div>`).join('')); } catch(e){ el.innerHTML='<div class="empty-state">Error loading</div>'; } };
window.adminShowLostFound = async function() { const el=document.getElementById('admin-content'); try { const snap=await getDocs(collection(db,'lost_found')); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)); el.innerHTML=`<div class="admin-section-title">Lost & Found (${docs.length})</div>`+(docs.length===0?'<div class="empty-state">No reports</div>':docs.map(r=>`<div class="list-item"><div class="list-item-row"><div><div class="list-item-title">${r.itemName||''}</div><div class="list-item-sub">${r.description||''} · ${r.location||''}</div><div class="list-item-sub">By: ${r.contactName||'-'}</div></div>${statusBadge(r.type)}</div></div>`).join('')); } catch(e){ el.innerHTML='<div class="empty-state">Error loading</div>'; } };
window.adminShowComplaints = async function() { const el=document.getElementById('admin-content'); try { const snap=await getDocs(collection(db,'complaints')); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)); el.innerHTML=`<div class="admin-section-title">Complaints (${docs.length})</div>`+(docs.length===0?'<div class="empty-state">No complaints</div>':docs.map(r=>`<div class="list-item"><div class="list-item-row"><div><div class="list-item-title">${r.subject||''}</div><div class="list-item-sub">${r.userName||'-'} · ${formatTime(r.createdAt)}</div><div class="list-item-sub">${(r.message||'').slice(0,80)}</div>${r.adminReply?`<div class="list-item-sub" style="color:var(--primary);">Reply: ${r.adminReply}</div>`:''}</div>${statusBadge(r.status)}</div><div style="display:flex;gap:0.4rem;margin-top:0.5rem;"><input class="form-input" id="reply-${r.id}" placeholder="Reply..." style="flex:1;padding:0.5rem;"/><button class="btn btn-primary" style="width:auto;padding:0.5rem 0.75rem;" onclick="replyComplaint('${r.id}')">Send</button></div></div>`).join('')); } catch(e){ el.innerHTML='<div class="empty-state">Error loading</div>'; } };
window.replyComplaint = async function(id) { const reply=document.getElementById('reply-'+id)?.value.trim(); if(!reply) return; showLoading('Sending...'); try { await updateDoc(doc(db,'complaints',id),{adminReply:reply,status:'resolved'}); showToast('Reply sent!','success'); adminShowComplaints(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };
window.adminShowChats = async function() { const el=document.getElementById('admin-content'); try { const snap=await getDocs(collection(db,'users')); const users=snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.role==='user'); if(users.length===0){ el.innerHTML='<div class="empty-state">No users</div>'; return; } el.innerHTML='<div class="admin-section-title">Select a user to chat</div>'+users.map(u=>`<div class="admin-row" style="display:flex;align-items:center;gap:0.75rem;padding:0.9rem 1rem;background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:0.5rem;cursor:pointer;" onclick="adminOpenChat('${u.id}','${(u.name||u.email||'User').replace(/'/g,"\\'")}')"><div class="admin-row-icon" style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#E3F2FD;">${(u.name||'?')[0].toUpperCase()}</div><div><div class="admin-row-label" style="font-weight:600;">${u.name||u.email||'-'}</div><div style="font-size:0.72rem;color:var(--text-muted);">ID: ${u.pickupId||'-'}</div></div><span class="admin-row-arrow">💬</span></div>`).join(''); } catch(e){ el.innerHTML='<div class="empty-state">Error loading</div>'; } };
let adminChatUnsub=null, adminChatUserId=null;
window.adminOpenChat = function(uid, name) { adminChatUserId=uid; const el=document.getElementById('admin-content'); el.innerHTML=`<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;"><button onclick="adminShowChats()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">←</button><div style="font-weight:700;">Chat with ${name}</div></div><div id="admin-chat-msgs" style="height:55vh;overflow-y:auto;padding:0.5rem;background:#F8FAFF;border-radius:14px;border:1px solid var(--border);margin-bottom:0.75rem;"></div><div style="display:flex;gap:0.5rem;"><input id="admin-chat-input" class="form-input" type="text" placeholder="Type a message..." style="flex:1;"/><button onclick="adminSendChat()" style="background:var(--primary);border:none;border-radius:12px;width:44px;height:44px;cursor:pointer;">➤</button></div>`; document.getElementById('admin-chat-input')?.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();adminSendChat();} }); if(adminChatUnsub) adminChatUnsub(); const q=query(collection(db,'chats',uid,'messages')); adminChatUnsub=onSnapshot(q, snap=>{ const msgs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)); const el2=document.getElementById('admin-chat-msgs'); if(!el2) return; if(msgs.length===0){ el2.innerHTML='<div class="empty-state" style="padding:2rem;"><div class="empty-icon">💬</div><div class="empty-title">No messages yet</div></div>'; return; } el2.innerHTML=msgs.map(m=>{ const mine=m.senderRole==='admin'; const d=m.createdAt?.toDate?m.createdAt.toDate():new Date(); return `<div class="chat-wrap ${mine?'mine':'theirs'}" style="display:flex;flex-direction:column;margin-bottom:0.75rem;${mine?'align-items:flex-end':'align-items:flex-start'}">${!mine?`<div class="chat-sender" style="font-size:0.72rem;font-weight:700;margin-bottom:0.2rem;color:var(--primary);">${m.senderName||'User'}</div>`:''}<div class="chat-bubble ${mine?'mine':'theirs'}" style="max-width:78%;padding:0.65rem 0.9rem;border-radius:18px;margin-bottom:0.5rem;font-size:0.88rem;${mine?'background:var(--primary);color:white;border-radius:18px 18px 4px 18px;margin-left:auto;':'background:white;color:var(--text-primary);border:1px solid var(--border);border-radius:18px 18px 18px 4px;margin-right:auto;'}">${m.text||''}<div class="chat-meta" style="font-size:0.65rem;opacity:0.7;margin-top:0.25rem;">${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div></div>`; }).join(''); el2.scrollTop=el2.scrollHeight; }); };
window.adminSendChat = async function() { const input=document.getElementById('admin-chat-input'); const text=input?.value.trim(); if(!text||!adminChatUserId) return; input.value=''; try { await addDoc(collection(db,'chats',adminChatUserId,'messages'),{ senderId:currentUser.uid, senderName:userData.name||'Admin', senderRole:'admin', text, createdAt:serverTimestamp() }); await addDoc(collection(db,'notifications'),{ userId:adminChatUserId, title:'New message from Admin', body:text.slice(0,60), type:'chat', read:false, createdAt:serverTimestamp() }); } catch(e){ showToast('Failed to send','error'); if(input) input.value=text; } };
window.adminSendNotification = function() { document.getElementById('sn-title').value=''; document.getElementById('sn-body').value=''; openModal('send-notif'); };
window.sendAdminNotification = async function() { const title=document.getElementById('sn-title').value.trim(); const body=document.getElementById('sn-body').value.trim(); const target=document.getElementById('sn-target').value; if(!title||!body){ showToast('Fill all fields','error'); return; } showLoading('Sending...'); try { const snap=await getDocs(collection(db,'users')); const users=snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>target==='all'?u.role==='user':u.role===target); const batch=writeBatch(db); users.forEach(u=>{ const ref=doc(collection(db,'notifications')); batch.set(ref,{ userId:u.id, title, body, type:'admin', read:false, createdAt:serverTimestamp() }); }); await batch.commit(); closeModal('send-notif'); showToast(`Sent to ${users.length} user${users.length!==1?'s':''}!`,'success'); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };

// ADS
function startAdListener() { if(_adUnsub) _adUnsub(); const q=query(collection(db,'ads'),where('isActive','==',true)); _adUnsub=onSnapshot(q, snap=>{ _allAds=snap.docs.map(d=>({id:d.id,...d.data()})); if(_allAds.length>0 && !_adDismissed) renderNextAd(); }); }
function renderNextAd() { const container=document.getElementById('dash-ad-container'); if(!container || !_allAds.length) return; const ad=_allAds[_adIndex % _allAds.length]; const link=ad.linkUrl?.trim()||''; let media=''; if(ad.imageUrl?.trim()){ const url=toDirectImgUrl(ad.imageUrl); media=`<img src="${url}" style="width:100%;height:120px;object-fit:cover;" onerror="this.style.display='none'">`; } else { media=`<div style="height:80px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1565C0,#0D47A1);color:white;font-size:2rem;">📢</div>`; } container.innerHTML=`<div class="ad-card" style="position:relative;background:white;border-radius:16px;overflow:hidden;margin-bottom:1rem;cursor:pointer;" onclick="tapAd('${ad.id}','${link.replace(/'/g,"\\'")}')"><span class="ad-label" style="position:absolute;top:8px;right:10px;background:rgba(0,0,0,0.45);color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;z-index:1;">AD</span>${media}<div style="padding:0.75rem;"><div style="font-weight:700;">${ad.title||''}</div>${ad.body?`<div style="font-size:0.75rem;color:var(--text-muted);">${ad.body}</div>`:''}</div></div>`; try { updateDoc(doc(db,'ads',ad.id),{ impressions:(ad.impressions||0)+1, lastSeen:serverTimestamp() }); } catch(e){} }
window.tapAd = async function(id,link) { try { const d=await getDoc(doc(db,'ads',id)); if(d.exists()) await updateDoc(doc(db,'ads',id),{ taps:(d.data().taps||0)+1, lastTap:serverTimestamp() }); } catch(e){} if(link) window.open(link.startsWith('http')?link:'https://'+link,'_blank'); };

// AUTH & UTILITIES
window.showSettings = function() { if(!userData) return; document.getElementById('settings-content').innerHTML=`<div style="display:flex;align-items:center;gap:1rem;padding:1rem;background:#F0F4FF;border-radius:14px;margin-bottom:1rem;"><div style="width:54px;height:54px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.3rem;color:white;">${getInitials(userData.name)}</div><div><div style="font-weight:700;">${userData.name||'-'}</div><div style="font-size:0.78rem;color:var(--text-muted);">${currentUser.email||'-'}</div><div style="font-size:0.72rem;color:var(--primary);font-weight:700;">${(userData.role||'user').toUpperCase()}</div></div></div><div style="background:#F0F4FF;border-radius:14px;padding:1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;"><div><div style="font-size:0.72rem;color:var(--text-muted);font-weight:600;">Pickup ID</div><div style="font-size:1.8rem;font-weight:800;color:var(--primary);">${userData.pickupId||'---'}</div></div><button onclick="copyPickupId()" style="background:var(--primary);color:white;border:none;border-radius:10px;padding:0.5rem 1rem;font-size:0.8rem;font-weight:700;cursor:pointer;">Copy</button></div>`; openModal('settings'); };
window.copyPickupId = function() { if(userData?.pickupId) navigator.clipboard?.writeText(userData.pickupId); showToast('Copied!','success'); };
window.logout = async function() { const ok=await showConfirm('Sign Out','Are you sure you want to sign out?'); if(!ok) return; showLoading('Signing out...'); try{ await signOut(auth); }finally{ hideLoading(); } };
function showConfirm(title,msg) { return new Promise(resolve=>{ document.getElementById('confirm-title').textContent=title; document.getElementById('confirm-msg').textContent=msg; const ov=document.getElementById('confirm-overlay'); ov.classList.add('show'); const close=v=>{ ov.classList.remove('show'); resolve(v); }; document.getElementById('confirm-ok-btn').onclick=()=>close(true); document.getElementById('confirm-cancel-btn').onclick=()=>close(false); ov.onclick=e=>{ if(e.target===ov) close(false); }; }); }
function renderLoginScreen() { const container=document.getElementById('screen-login'); container.innerHTML=`<div class="auth-container" style="min-height:100%;padding:3rem 1.5rem"><div class="auth-logo" style="font-size:2.5rem;font-weight:800;color:white;text-align:center">ASSA<span style="color:#90CAF9">.</span></div><div class="auth-tagline" style="color:rgba(255,255,255,0.6);text-align:center;margin-bottom:2.5rem">AFIT Shuttle Service</div><div class="auth-card" style="background:white;border-radius:24px;padding:1.8rem"><div class="auth-title" style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem">Welcome back</div><div class="form-group"><input class="form-input" id="login-email" type="email" placeholder="Email"/></div><div class="form-group"><input class="form-input" id="login-password" type="password" placeholder="Password"/></div><button class="btn btn-primary" onclick="login()">Sign In</button></div><div class="auth-switch" style="text-align:center;margin-top:1.2rem;color:rgba(255,255,255,0.7)">Don't have an account? <a href="#" onclick="showScreen('register');return false" style="color:#90CAF9">Register</a></div></div>`; }
function renderRegisterScreen() { const container=document.getElementById('screen-register'); container.innerHTML=`<div class="auth-container" style="min-height:100%;padding:3rem 1.5rem"><div class="auth-logo" style="font-size:2.5rem;font-weight:800;color:white;text-align:center">ASSA<span style="color:#90CAF9">.</span></div><div class="auth-tagline" style="color:rgba(255,255,255,0.6);text-align:center;margin-bottom:2.5rem">Create your account</div><div class="auth-card" style="background:white;border-radius:24px;padding:1.8rem"><div class="auth-title" style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem">Get started</div><div class="form-group"><input class="form-input" id="reg-name" placeholder="Full name"/></div><div class="form-group"><input class="form-input" id="reg-email" type="email" placeholder="Email"/></div><div class="form-group"><input class="form-input" id="reg-password" type="password" placeholder="Password (min 6)"/></div><select class="form-input" id="reg-role"><option value="user">User</option><option value="driver">Driver</option></select><button class="btn btn-primary" onclick="register()" style="margin-top:1rem">Create Account</button></div><div class="auth-switch" style="text-align:center;margin-top:1.2rem;color:rgba(255,255,255,0.7)">Already have an account? <a href="#" onclick="showScreen('login');return false" style="color:#90CAF9">Sign In</a></div></div>`; }
window.login = async function() { const email=document.getElementById('login-email')?.value; const pass=document.getElementById('login-password')?.value; if(!email||!pass){ showToast('Enter email and password','error'); return; } try { await signInWithEmailAndPassword(auth, email, pass); } catch(e){ showToast(e.message, 'error'); } };
window.register = async function() { const name=document.getElementById('reg-name')?.value; const email=document.getElementById('reg-email')?.value; const pass=document.getElementById('reg-password')?.value; const role=document.getElementById('reg-role')?.value; if(!name||!email||!pass){ showToast('Fill all fields','error'); return; } if(pass.length<6){ showToast('Password min 6 chars','error'); return; } try { const cred=await createUserWithEmailAndPassword(auth, email, pass); const uid=cred.user.uid; const letters='ABCDEFGHJKLMNPQRSTUVWXYZ'; let hash=0; for(let i=0;i<uid.length;i++) hash=(hash*31+uid.charCodeAt(i))|0; const pickupId=letters[Math.abs(hash)%letters.length] + String(Math.abs(hash)%100).padStart(2,'0'); await setDoc(doc(db,'users',uid),{ name, email, role, pickupId, platform:'pwa', createdAt:serverTimestamp() }); showToast('Account created!','success'); } catch(e){ showToast(e.message, 'error'); } };

loadFirebase();
</script>
