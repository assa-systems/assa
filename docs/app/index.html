<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ASSA — AFIT Shuttle Service</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ASSA"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* CRITICAL CSS — loads immediately for skeleton screens */
    :root{--primary:#1565C0;--primary-dark:#0D47A1;--success:#2E7D32;--warning:#F57F17;--danger:#C62828;--text-primary:#1A237E;--text-secondary:#546E7A;--bg:#F0F4FF;--card:#FFFFFF;--border:#E3E8F0;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg)}
    #app{height:100%;display:flex;flex-direction:column;overflow:hidden}
    .screen{display:none;flex-direction:column;height:100%;overflow:hidden}
    .screen.active{display:flex}
    /* SPLASH SCREEN */
    #screen-splash{background:linear-gradient(160deg,#0A2E6E 0%,#1565C0 60%,#1976D2 100%);align-items:center;justify-content:center;gap:1rem}
    .splash-logo{font-size:3.5rem;font-weight:800;color:white;letter-spacing:-0.02em}
    .splash-logo span{color:#90CAF9}
    .splash-sub{color:rgba(255,255,255,0.65);font-size:0.85rem}
    .splash-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.25);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:2rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* SKELETON LOADING */
    .skeleton{background:linear-gradient(90deg,#e0e0e0 25%,#f0f0f0 50%,#e0e0e0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    /* UTILITIES */
    .btn{display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;padding:0.9rem;border:none;border-radius:14px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.15s}
    .btn:active{transform:scale(0.97)}
    .btn-primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:white}
    .form-input{width:100%;padding:0.85rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-size:0.95rem;font-family:inherit;background:#FAFCFF;outline:none}
    .toast{position:fixed;bottom:calc(var(--safe-bottom) + 5rem);left:1rem;right:1rem;background:#1a1a2e;color:white;padding:0.9rem 1.2rem;border-radius:14px;font-size:0.85rem;z-index:400;transform:translateY(20px);opacity:0;transition:all 0.25s;pointer-events:none}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:var(--success)}
    .toast.error{background:var(--danger)}
    .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.95);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
    .loading-overlay.hidden{display:none}
    .loading-spinner{width:40px;height:40px;border:4px solid #E3F2FD;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;padding:0.5rem 0 calc(var(--safe-bottom) + 0.3rem);z-index:50}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.2rem;padding:0.3rem;background:none;border:none;font-family:inherit;cursor:pointer}
    .nav-item .nav-icon{font-size:1.3rem}
    .nav-item .nav-label{font-size:0.62rem;font-weight:500;color:var(--text-muted)}
    .nav-item.active .nav-label{color:var(--primary);font-weight:700}
    .content{flex:1;overflow-y:auto;padding:1rem 1rem calc(var(--safe-bottom) + 5rem);-webkit-overflow-scrolling:touch}
    .card{background:var(--card);border-radius:18px;padding:1.2rem;margin-bottom:1rem;border:1px solid var(--border)}
    .section-title{font-size:0.95rem;font-weight:700;color:var(--text-primary);margin-bottom:0.8rem}
    .empty-state{text-align:center;padding:3rem 1rem}
    .empty-icon{font-size:3rem;margin-bottom:1rem}
    .empty-title{font-size:1rem;font-weight:700;color:var(--text-primary)}
    .empty-sub{font-size:0.82rem;color:var(--text-muted)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
    .modal-overlay.show{opacity:1;pointer-events:all}
    .modal{background:white;border-radius:28px 28px 0 0;padding:1.5rem;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s}
    .modal-overlay.show .modal{transform:translateY(0)}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.2rem}
    .modal-title{font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:1rem}
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity 0.2s}
    .confirm-overlay.show{opacity:1;pointer-events:all}
    .confirm-box{background:white;border-radius:20px;padding:1.5rem;width:100%;max-width:340px;transform:scale(0.92);transition:transform 0.2s}
    .confirm-overlay.show .confirm-box{transform:scale(1)}
    .confirm-icon{font-size:2.5rem;text-align:center;margin-bottom:0.75rem}
    .confirm-title{font-size:1rem;font-weight:800;color:var(--text-primary);text-align:center}
    .confirm-msg{font-size:0.83rem;color:var(--text-muted);text-align:center;margin:0.5rem 0 1.2rem}
    .confirm-btns{display:flex;gap:0.6rem}
    .status-badge{display:inline-block;padding:0.25rem 0.7rem;border-radius:50px;font-size:0.7rem;font-weight:700;text-transform:uppercase}
    .badge-pending{background:#FFF8E1;color:#F57F17}
    .badge-approved{background:#E8F5E9;color:#2E7D32}
    .badge-rejected,.badge-cancelled{background:#FFEBEE;color:#C62828}
    .list-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:0.75rem}
    .list-item-row{display:flex;justify-content:space-between;align-items:flex-start}
    .list-item-title{font-size:0.9rem;font-weight:600;color:var(--text-primary)}
    .list-item-sub{font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem}
    .quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;margin-bottom:1rem}
    .quick-btn{background:white;border:1px solid var(--border);border-radius:16px;padding:1rem;text-align:center;cursor:pointer;transition:all 0.15s}
    .quick-btn:active{transform:scale(0.96)}
    .quick-btn .icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1.4rem}
    .quick-btn .label{font-weight:700;font-size:0.8rem}
    .quick-btn .sub{font-size:0.68rem;color:var(--text-muted)}
    .pickup-card{background:linear-gradient(135deg,#0D47A1,#1565C0);border-radius:18px;padding:1.2rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
    .sub-header{background:linear-gradient(135deg,#1565C0,#0D47A1);padding:calc(var(--safe-top) + 1rem) 1.2rem 1.2rem;display:flex;align-items:center;gap:0.75rem;flex-shrink:0;border-radius:0 0 24px 24px}
    .back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
    .topbar{background:linear-gradient(135deg,#1565C0,#0D47A1);padding:calc(var(--safe-top) + 1rem) 1.2rem 1.2rem;flex-shrink:0;border-radius:0 0 24px 24px}
    .topbar-row{display:flex;align-items:center;gap:0.75rem}
    .topbar-avatar{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:white}
    .topbar-name{color:white;font-weight:700;font-size:1rem;flex:1}
    .topbar-greeting{color:rgba(255,255,255,0.7);font-size:0.73rem}
    .topbar-icon{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:white}
    .status-pill{display:inline-flex;align-items:center;gap:0.4rem;background:rgba(255,255,255,0.15);border-radius:50px;padding:0.3rem 0.8rem;margin-top:0.75rem}
    .status-dot{width:7px;height:7px;border-radius:50%}
    .status-dot.online{background:#69F0AE}
    .status-dot.offline{background:#FFD740}
    .offline-banner{background:var(--warning);padding:0.6rem 1rem;display:flex;align-items:center;gap:0.5rem;flex-shrink:0;color:white;font-size:0.8rem;font-weight:600}
    .offline-banner.hidden{display:none}
    .notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;background:#FF5252;border-radius:50%;font-size:9px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;padding:0 4px}
    .notif-badge.hidden{display:none}
    .chat-bubble{max-width:78%;padding:0.65rem 0.9rem;border-radius:18px;margin-bottom:0.5rem;font-size:0.88rem;word-break:break-word}
    .chat-bubble.mine{background:var(--primary);color:white;border-radius:18px 18px 4px 18px;margin-left:auto}
    .chat-bubble.theirs{background:white;color:var(--text-primary);border:1px solid var(--border);border-radius:18px 18px 18px 4px}
    .chat-wrap{display:flex;flex-direction:column;margin-bottom:0.75rem}
    .chat-wrap.mine{align-items:flex-end}
    .chat-wrap.theirs{align-items:flex-start}
    .chat-meta{font-size:0.65rem;opacity:0.7;margin-top:0.25rem}
    .chat-sender{font-size:0.72rem;font-weight:700;margin-bottom:0.2rem;color:var(--primary)}
    .admin-row{display:flex;align-items:center;gap:0.75rem;padding:0.9rem 1rem;background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:0.5rem;cursor:pointer}
    .admin-row-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:#E3F2FD}
    .admin-row-label{flex:1;font-weight:600;color:var(--text-primary)}
    .admin-row-arrow{color:var(--text-muted);font-size:1rem}
    .admin-section-title{font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin:1rem 0 0.5rem}
    .driver-request-card{background:white;border:1.5px solid var(--border);border-radius:16px;padding:1rem;margin-bottom:0.75rem}
    .driver-route{font-size:0.95rem;font-weight:700;margin-bottom:0.5rem}
    .driver-meta{display:flex;flex-wrap:wrap;gap:0.4rem}
    .driver-chip{background:#F0F4FF;color:var(--primary);border-radius:50px;padding:0.2rem 0.65rem;font-size:0.72rem;font-weight:600}
    .intent-banner{background:linear-gradient(135deg,#1B5E20,#2E7D32);border-radius:18px;padding:1.2rem;margin-bottom:1rem}
    .intent-badge{display:inline-flex;align-items:center;gap:0.35rem;background:rgba(255,255,255,0.2);border-radius:50px;padding:0.25rem 0.7rem;font-size:0.7rem;font-weight:700;color:white}
    .intent-dot{width:6px;height:6px;border-radius:50%;background:#69F0AE;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .intent-btns{display:flex;gap:0.6rem;margin-top:0.9rem}
    .intent-reject{flex:1;padding:0.7rem;border:1px solid rgba(255,255,255,0.3);border-radius:12px;background:transparent;color:white;font-weight:600;cursor:pointer}
    .intent-accept{flex:2;padding:0.7rem;border:none;border-radius:12px;background:white;color:#1B5E20;font-weight:800;cursor:pointer}
    .stage-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:8px;border-radius:12px;background:#F8FAFF}
    .stage-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#E3F2FD;color:var(--primary);flex-shrink:0}
    .stage-dot.done{background:var(--success);color:white}
    .stage-label{font-size:13px;font-weight:700;color:var(--text-primary)}
    .stage-sub{font-size:11px;color:var(--text-muted)}
    .wait-tip{background:#E8F5E9;border-radius:12px;padding:0.9rem;margin-top:1rem}
    .wait-tip-title{font-size:0.8rem;font-weight:700;color:var(--success);margin-bottom:0.4rem}
    .game-card{background:linear-gradient(135deg,#6A1B9A,#4A148C);border-radius:20px;padding:18px;margin-bottom:14px;cursor:pointer;transition:transform 0.15s}
    .game-card:active{transform:scale(0.98)}
    .game-card.quiz{background:linear-gradient(135deg,#1565C0,#0D47A1)}
    .game-card.tap{background:linear-gradient(135deg,#00897B,#00695C)}
    .score-summary{background:#1A1F2E;border-radius:18px;padding:18px;margin-bottom:16px;border:1px solid #2A3040;color:white}
    .score-number{font-size:32px;font-weight:900}
    .budget-bar{height:6px;background:#2A3040;border-radius:3px;overflow:hidden;margin-top:8px}
    .budget-fill{height:100%;background:#00897B;border-radius:3px;width:0%}
    .face-banner{background:linear-gradient(135deg,#FFD700,#FFA000);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
    .face-avatar{width:56px;height:56px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:28px}
    .puzzle-grid{display:grid;gap:2px;background:#1A237E;border-radius:12px;padding:2px}
    .puzzle-tile{background:linear-gradient(135deg,#1565C0,#0D47A1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;cursor:pointer;transition:all 0.1s}
    .puzzle-tile.empty{background:#0D1B6E;cursor:default}
    .quiz-option{padding:16px;border:2px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer;transition:all 0.15s}
    .quiz-option.correct{background:#E8F5E9;border-color:var(--success);color:var(--success)}
    .quiz-option.wrong{background:#FFEBEE;border-color:var(--danger);color:var(--danger)}
    .quiz-timer{height:6px;background:#E0E0E0;border-radius:3px;overflow:hidden;margin-bottom:16px}
    .quiz-timer-fill{height:100%;background:var(--primary);border-radius:3px;width:100%}
    .leaderboard-podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:24px}
    .podium-item{text-align:center;flex:1}
    .podium-avatar{width:64px;height:64px;border-radius:50%;background:gold;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:28px}
    .lf-image{width:100%;height:160px;object-fit:cover;display:block}
    .ad-card{background:white;border-radius:16px;overflow:hidden;margin-bottom:1rem;border:1px solid var(--border);cursor:pointer}
    .ad-label{position:absolute;top:8px;right:10px;background:rgba(0,0,0,0.45);color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
    .ad-img{width:100%;height:140px;object-fit:cover}
  </style>
</head>
<body>
<div id="app">

  <!-- SPLASH SCREEN -->
  <div id="screen-splash" class="screen active">
    <div class="splash-logo">ASSA<span>.</span></div>
    <div class="splash-sub">AFIT Shuttle Service App</div>
    <div class="splash-spinner"></div>
  </div>

  <!-- SCREEN SHELLS (with skeletons) -->
  <div id="screen-dashboard" class="screen">
    <div class="topbar"><div class="topbar-row"><div class="topbar-avatar" id="dash-avatar">?</div><div style="flex:1"><div class="topbar-greeting" id="dash-greeting">Good morning</div><div class="topbar-name" id="dash-name">Loading...</div></div><button class="topbar-icon" onclick="showScreen('notifications')" style="position:relative;">🔔<span class="notif-badge hidden" id="dash-notif-badge">0</span></button><button class="topbar-icon" onclick="showSettings()">⚙️</button></div><div class="status-pill"><div class="status-dot online" id="dash-status-dot"></div><span class="status-text" id="dash-status-text">Checking...</span></div></div>
    <div class="offline-banner hidden" id="dash-offline-banner"><span>📵</span><span>Offline Mode — Campus WiFi only</span></div>
    <div class="content" id="dashboard-content"><div class="skeleton" style="height:100px;border-radius:18px;margin-bottom:1rem"></div><div class="skeleton" style="height:60px;border-radius:12px;margin-bottom:0.5rem"></div><div class="skeleton" style="height:60px;border-radius:12px;margin-bottom:0.5rem"></div><div class="skeleton" style="height:60px;border-radius:12px;margin-bottom:0.5rem"></div></div>
    <div class="bottom-nav"><button class="nav-item active" data-nav="dashboard" onclick="showScreen('dashboard')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button><button class="nav-item" data-nav="request" onclick="showScreen('request')"><span class="nav-icon">🚐</span><span class="nav-label">Ride</span></button><button class="nav-item" data-nav="myrequests" onclick="showScreen('myrequests')"><span class="nav-icon">📋</span><span class="nav-label">Requests</span></button><button class="nav-item" data-nav="gamehub" onclick="showScreen('gamehub')"><span class="nav-icon">🎮</span><span class="nav-label">Game</span></button><button class="nav-item" data-nav="notifications" onclick="showScreen('notifications')"><span class="nav-icon">🔔</span><span class="nav-label">Alerts</span></button></div>
  </div>

  <div id="screen-request" class="screen"><div class="sub-header"><button class="back-btn" onclick="showScreen('dashboard')">←</button><div class="sub-title">Book a Ride</div><div id="req-mode-chip" style="margin-left:auto;background:rgba(255,255,255,0.15);border-radius:50px;padding:0.25rem 0.7rem;font-size:0.72rem;font-weight:600;color:white;">Checking...</div></div><div class="offline-banner hidden" id="req-offline-banner"></div><div class="content" id="request-content"><div class="skeleton" style="height:200px;border-radius:18px"></div><div class="skeleton" style="height:150px;border-radius:18px;margin-top:1rem"></div></div><div class="bottom-nav"><button class="nav-item" data-nav="dashboard" onclick="showScreen('dashboard')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button><button class="nav-item active" data-nav="request" onclick="showScreen('request')"><span class="nav-icon">🚐</span><span class="nav-label">Ride</span></button><button class="nav-item" data-nav="myrequests" onclick="showScreen('myrequests')"><span class="nav-icon">📋</span><span class="nav-label">Requests</span></button><button class="nav-item" data-nav="gamehub" onclick="showScreen('gamehub')"><span class="nav-icon">🎮</span><span class="nav-label">Game</span></button><button class="nav-item" data-nav="notifications" onclick="showScreen('notifications')"><span class="nav-icon">🔔</span><span class="nav-label">Alerts</span></button></div></div>

<script>
// ============================================================================
// ASSA PWA — OPTIMIZED WITH LAZY LOADING
// ============================================================================

let auth, db, currentUser = null, userData = null;
let isOnline = true, rideType = 'Shared', paxCount = 1, selectedPickup = null, selectedDest = null;
let notifUnsub = null, intentUnsub = null, chatUnsub = null, activeFeedbackListener = null;
let puzzleTiles = [], puzzleMoves = 0, puzzleSeconds = 0, puzzleTimer = null, puzzleImageUrl = '';
let quizQuestions = [], quizIndex = 0, quizScore = 0, quizTimerInterval = null;
let tapGameActive = false, tapScore = 0, tapTimeLeft = 30, tapTimerInterval = null, tapMoveInterval = null;
let _allAds = [], _adIndex = 0, _adUnsub = null, _adDismissed = false;

const ALL_LOCATIONS = ['AFIT Gates','45x1 Hostel','Old Girls Hostel','TETFUND Hostel','BK','Boys Hostel','Alfa Hall','EED','AFIT Mosque','New Mechanical','Centre of Entrepreneurship','Hall A'];
const OFFLINE_PICKUPS = ['45x1 Hostel','Old Girls Hostel','Boys Hostel'];

function getInitials(n) { return n ? n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?'; }
function getGreeting() { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }
function formatTime(ts) { if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function statusBadge(s) { const m={0:['Pending','badge-pending'],1:['Assigned','badge-approved'],4:['Rejected','badge-rejected'],5:['Cancelled','badge-cancelled']}; const [l,c]=m[s]??['Unknown','badge-pending']; return `<span class="status-badge ${c}">${l}</span>`; }
function toDirectImgUrl(url) { if(!url) return ''; const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/); return m?`https://lh3.googleusercontent.com/d/${m[1]}`:url; }
function showToast(msg,type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+type; setTimeout(()=>t.classList.remove('show'),3000); }
function showLoading(msg) { document.getElementById('loading-text').textContent=msg||'Please wait...'; document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
function closeModal(id) { document.getElementById('modal-'+id)?.classList.remove('show'); if(activeFeedbackListener) { activeFeedbackListener(); activeFeedbackListener=null; } }
function openModal(id) { document.getElementById('modal-'+id).classList.add('show'); }

function generatePickupId(uid) { const letters='ABCDEFGHJKLMNPQRSTUVWXYZ'; let hash=0; for(let i=0;i<uid.length;i++) hash=(hash*31+uid.charCodeAt(i))|0; return letters[Math.abs(hash)%letters.length] + String(Math.abs(hash)%100).padStart(2,'0'); }

function checkConnectivity() { return navigator.onLine; }
function updateOnlineStatus() { isOnline = navigator.onLine; const dot=document.getElementById('dash-status-dot'); if(dot){ dot.className='status-dot '+(isOnline?'online':'offline'); document.getElementById('dash-status-text').textContent=isOnline?'Online':'Campus WiFi'; } document.getElementById('dash-offline-banner')?.classList.toggle('hidden',isOnline); return isOnline; }
window.addEventListener('online', ()=>{ isOnline=true; updateOnlineStatus(); showToast('Back online ✓','success'); });
window.addEventListener('offline', ()=>{ isOnline=false; updateOnlineStatus(); showToast('Offline — Campus WiFi Mode',''); });

// LOAD FIREBASE (lazy)
async function loadFirebase() {
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  const { getFirestore, doc, getDoc, setDoc, addDoc, updateDoc, collection, query, where, onSnapshot, serverTimestamp, getDocs, writeBatch, FieldValue } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  
  const firebaseConfig = { apiKey: "AIzaSyCBN5iCfV2o8to9A5H2nUb-bXRDYhD4PJc", authDomain: "afit-shuttle-system.firebaseapp.com", projectId: "afit-shuttle-system", storageBucket: "afit-shuttle-system.appspot.com", messagingSenderId: "419651451775", appId: "1:419651451775:ios:166e02856ad950fd15b84a" };
  const app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
  window.auth = auth; window.db = db;
  
  onAuthStateChanged(auth, async user => {
    if (user) { currentUser = user; await loadUserData(user.uid); }
    else { currentUser = null; userData = null; showScreen('login'); renderLoginScreen(); }
    document.getElementById('screen-splash')?.classList.remove('active');
  });
}

async function loadUserData(uid) {
  try {
    const ref = doc(db, 'users', uid);
    let snap = await getDoc(ref);
    let data = snap.data();
    if (!data || !data.pickupId) {
      const pickupId = generatePickupId(uid);
      if (data) await updateDoc(ref, { pickupId });
      else data = { name: currentUser.email?.split('@')[0]||'User', email: currentUser.email, role: 'user', pickupId, platform: 'pwa', createdAt: serverTimestamp() };
    }
    userData = data;
    updateOnlineStatus();
    startNotifListener(uid);
    if (data.role === 'admin') showScreen('admin');
    else if (data.role === 'driver') { showScreen('driver'); loadDriverRequests(); startIntentListener(uid); }
    else showScreen('dashboard');
  } catch(e) { showScreen('login'); renderLoginScreen(); }
}

function startNotifListener(uid) { if(notifUnsub) notifUnsub(); const q=query(collection(db,'notifications'),where('userId','==',uid),where('read','==',false)); notifUnsub=onSnapshot(q, snap=>{ const badge=document.getElementById('dash-notif-badge'); if(badge){ badge.textContent=snap.size; badge.classList.toggle('hidden',snap.size===0); } }); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('screen-'+id);
  if(el) el.classList.add('active');
  if(id==='dashboard') renderDashboard();
  if(id==='request') renderRequestScreen();
  if(id==='myrequests') renderMyRequests();
  if(id==='gamehub') renderGameHub();
  if(id==='lostfound') renderLostFound();
  if(id==='notifications') { if(document.getElementById('tab-notifs')?.style.color==='var(--primary)') renderNotifications(); else loadChat(); }
  if(id==='report') renderReport();
  if(id==='login') renderLoginScreen();
  if(id==='register') renderRegisterScreen();
  if(id==='puzzle') loadPuzzle();
  if(id==='quiz') loadQuiz();
  if(id==='tap') startTapChallenge();
  if(id==='leaderboard') loadLeaderboard(window.currentLeaderboardGame||'puzzle');
}

// RENDER FUNCTIONS
function renderDashboard() {
  if(!userData) return;
  const container = document.getElementById('dashboard-content');
  container.innerHTML = `
    <div class="pickup-card"><div style="width:52px;height:52px;background:rgba(255,255,255,0.15);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;">🪪</div><div><div style="color:rgba(255,255,255,0.7);font-size:0.72rem;">Your Pickup ID</div><div style="color:white;font-size:2rem;font-weight:800;letter-spacing:0.1em;">${userData.pickupId||'---'}</div><div style="color:rgba(255,255,255,0.5);font-size:0.68rem;">Show this to your driver</div></div><button onclick="copyPickupId()" style="margin-left:auto;background:rgba(255,255,255,0.2);border:none;border-radius:10px;padding:0.5rem 0.9rem;color:white;font-size:0.75rem;font-weight:700;cursor:pointer;">Copy</button></div>
    <div class="section-title">Quick Actions</div>
    <div class="quick-grid"><div class="quick-btn" onclick="showScreen('request')"><div class="icon" style="background:#E3F2FD;">🚐</div><div class="label">Request Ride</div><div class="sub">Book a shuttle</div></div><div class="quick-btn" onclick="showScreen('myrequests')"><div class="icon" style="background:#E8F5E9;">📋</div><div class="label">My Requests</div><div class="sub">View history</div></div><div class="quick-btn" onclick="showScreen('gamehub')"><div class="icon" style="background:#F3E5F5;">🎮</div><div class="label">Game Hub</div><div class="sub">Play & win</div></div><div class="quick-btn" onclick="showScreen('lostfound')"><div class="icon" style="background:#FFF3E0;">🔍</div><div class="label">Lost & Found</div><div class="sub">Report items</div></div><div class="quick-btn" onclick="showScreen('report')"><div class="icon" style="background:#FFEBEE;">⚠️</div><div class="label">Report Issue</div><div class="sub">Contact admin</div></div></div>
    <div id="dash-ad-container"></div>`;
  startAdListener();
  document.getElementById('dash-avatar').textContent=getInitials(userData.name);
  document.getElementById('dash-name').textContent=userData.name||'User';
  document.getElementById('dash-greeting').textContent=getGreeting();
  document.getElementById('dash-pickup-id').textContent=userData.pickupId||'---';
}

function renderRequestScreen() {
  selectedPickup=null; selectedDest=null;
  isOnline=checkConnectivity(); updateOnlineStatus();
  const chips = isOnline ? ALL_LOCATIONS : OFFLINE_PICKUPS;
  document.getElementById('request-content').innerHTML = `
    <div class="card"><div class="card-title">Pickup Location</div><div class="location-chips" id="req-pickup-chips">${chips.map(l=>`<div class="loc-chip" onclick="selectPickup('${l}')">${l}</div>`).join('')}</div><div id="req-offline-note" style="display:${isOnline?'none':'block'};font-size:0.75rem;color:var(--warning);margin-top:0.3rem;">⚠ Campus WiFi: hostel pickups only</div></div>
    <div class="card"><div class="card-title">Destination</div><div class="info-tip" style="background:#E3F2FD;border-left:3px solid var(--primary);padding:0.7rem;margin-bottom:1rem;font-size:0.8rem;">💡 Select the zone closest to your destination. You can negotiate your exact drop-off point with the driver on arrival.</div><div class="location-chips" id="req-dest-chips">${ALL_LOCATIONS.map(l=>`<div class="loc-chip" onclick="selectDest('${l}')">${l}</div>`).join('')}</div></div>
    <div class="card"><div class="card-title">Ride Type</div><div class="ride-type-row" style="display:flex;gap:0.75rem"><button class="ride-type-btn active" style="flex:1;padding:0.9rem;border:2px solid var(--border);border-radius:14px;background:white;cursor:pointer;" onclick="setRideType('Shared')"><span style="font-size:1.3rem;">👥</span>Shared Ride</button><button class="ride-type-btn" style="flex:1;padding:0.9rem;border:2px solid var(--border);border-radius:14px;background:white;cursor:pointer;" onclick="setRideType('Chartered')"><span style="font-size:1.3rem;">🚌</span>Chartered</button></div></div>
    <div class="card" id="pax-card"><div class="card-title">Number of Passengers</div><div class="pax-row" style="display:flex;gap:0.5rem;justify-content:space-between"><div onclick="setPax(1)" class="pax-circle active" style="width:56px;height:56px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">1</div><div onclick="setPax(2)" class="pax-circle" style="width:56px;height:56px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">2</div><div onclick="setPax(3)" class="pax-circle" style="width:56px;height:56px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">3</div><div onclick="setPax(4)" class="pax-circle" style="width:56px;height:56px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">4</div></div></div>
    <div class="summary-card hidden" id="req-summary" style="background:#F8FAFF;border-radius:14px;padding:1rem"><div style="font-weight:700;margin-bottom:0.75rem;">Request Summary</div><div class="summary-row"><span class="summary-key">📍 From</span><span class="summary-val" id="sum-from">-</span></div><div class="summary-row"><span class="summary-key">🏁 To</span><span class="summary-val" id="sum-to">-</span></div><div class="summary-row"><span class="summary-key">🚐 Type</span><span class="summary-val" id="sum-type">-</span></div></div>
    <button class="btn btn-primary" onclick="submitRequest()" style="margin-bottom:0.75rem;">Send Request</button>`;
  document.getElementById('req-mode-chip').textContent=isOnline?'🟢 Online':'🟡 Campus WiFi';
  document.getElementById('req-offline-banner')?.classList.toggle('hidden',isOnline);
}

window.selectPickup = function(loc) { selectedPickup=loc; document.querySelectorAll('#req-pickup-chips .loc-chip').forEach(c=>c.classList.toggle('selected',c.textContent===loc)); document.querySelectorAll('#req-dest-chips .loc-chip').forEach(c=>c.classList.toggle('disabled',c.textContent===loc)); updateSummary(); };
window.selectDest = function(loc) { selectedDest=loc; document.querySelectorAll('#req-dest-chips .loc-chip').forEach(c=>c.classList.toggle('selected',c.textContent===loc)); document.querySelectorAll('#req-pickup-chips .loc-chip').forEach(c=>c.classList.toggle('disabled',c.textContent===loc)); updateSummary(); };
function updateSummary() { if(selectedPickup&&selectedDest){ document.getElementById('sum-from').textContent=selectedPickup; document.getElementById('sum-to').textContent=selectedDest; document.getElementById('sum-type').textContent=rideType+(rideType==='Shared'?` · ${paxCount} pax`:''); document.getElementById('req-summary').classList.remove('hidden'); } }
window.setRideType = function(type) { rideType=type; document.querySelectorAll('.ride-type-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&type==='Shared')||(i===1&&type==='Chartered'))); document.getElementById('pax-card').style.display=type==='Shared'?'block':'none'; updateSummary(); };
window.setPax = function(n) { paxCount=n; document.querySelectorAll('.pax-circle').forEach(c=>c.classList.toggle('active',parseInt(c.textContent)===n)); updateSummary(); };
window.submitRequest = async function() { if(!selectedPickup||!selectedDest){ showToast('Select pickup and destination','error'); return; } if(selectedPickup===selectedDest){ showToast('Pickup and destination cannot be the same','error'); return; } showLoading('Submitting...'); try { if(checkConnectivity()) await submitOnlineRequest(); else await submitOfflineRequest(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };
async function submitOnlineRequest() { const pax=rideType==='Chartered'?1:paxCount; const docRef=await addDoc(collection(db,'ride_requests'),{ userId:currentUser.uid, userName:userData.name, pickupId:userData.pickupId, pickupLocation:selectedPickup, destination:selectedDest, rideType, passengerCount:pax, status:0, requestType:'online', platform:'pwa', timestamp:serverTimestamp() }); showFeedbackDialog(docRef.id); }
async function submitOfflineRequest() { const pax=rideType==='Chartered'?1:paxCount; await addDoc(collection(db,'offline_queue'),{ userId:currentUser.uid, userName:userData.name, pickupId:userData.pickupId, pickupLocation:selectedPickup, destination:selectedDest, rideType, passengerCount:pax, requestType:'offline', isSynced:false, createdAt:serverTimestamp() }); showToast('Request saved offline','success'); showFeedbackDialog(null,true); }
function showFeedbackDialog(bookingId,isOffline=false) { const content=document.getElementById('feedback-content'); content.innerHTML=`<div class="success-icon">✅</div><div class="success-title">Request Sent!</div><div class="success-msg">${isOffline?'Your request has been saved offline.':'Waiting for a shuttle to accept...'}</div><div class="stage-row"><div class="stage-dot done">✓</div><div><div class="stage-label">Request Received</div><div class="stage-sub">Your request has been sent</div></div></div><div class="stage-row" id="stage-accept"><div class="stage-dot" id="stage-accept-dot">○</div><div><div class="stage-label" id="stage-accept-label">Awaiting Acceptance</div><div class="stage-sub" id="stage-accept-sub">Waiting for a shuttle...</div></div></div><div class="stage-row" id="stage-assign"><div class="stage-dot" id="stage-assign-dot">○</div><div><div class="stage-label" id="stage-assign-label">Shuttle Assignment</div><div class="stage-sub" id="stage-assign-sub">Will be assigned when accepted</div></div></div><div class="wait-tip"><div class="wait-tip-title">💡 While you wait...</div><p>🎮 Try our puzzle game and climb the leaderboard!</p><p>🔍 Check Lost & Found — someone may have found something of yours!</p></div>`; openModal('feedback'); if(bookingId&&!isOffline){ if(activeFeedbackListener) activeFeedbackListener(); activeFeedbackListener=onSnapshot(doc(db,'ride_requests',bookingId), snap=>{ if(!snap.exists) return; const d=snap.data(); const status=d.status||0; const shuttleId=d.shuttleIdFeedback||''; if(status>=1){ document.getElementById('stage-accept-dot').innerHTML='✓'; document.getElementById('stage-accept-dot').className='stage-dot done'; document.getElementById('stage-accept-label').textContent='Request Accepted'; document.getElementById('stage-accept-sub').textContent='A shuttle has been assigned'; } if(shuttleId){ document.getElementById('stage-assign-dot').innerHTML='✓'; document.getElementById('stage-assign-dot').className='stage-dot done'; document.getElementById('stage-assign-label').textContent='Shuttle Assigned'; document.getElementById('stage-assign-sub').textContent=`Shuttle ${shuttleId} is on its way!`; } }); } }

async function renderMyRequests() { const el=document.getElementById('myrequests-content'); try { const q=query(collection(db,'ride_requests'),where('userId','==',currentUser.uid)); const snap=await getDocs(q); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0)); if(docs.length===0){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🚐</div><div class="empty-title">No requests yet</div><div class="empty-sub">Submit your first ride request</div></div>'; return; } el.innerHTML=docs.map(r=>`<div class="list-item"><div class="list-item-row"><div><div class="list-item-title">${r.pickupLocation||''} → ${r.destination||''}</div><div class="list-item-sub">${r.rideType||''} · ${r.passengerCount||1} pax · ${formatTime(r.timestamp)}${r.shuttleIdFeedback?` · Shuttle: ${r.shuttleIdFeedback}`:''}</div></div>${statusBadge(r.status)}</div>${r.status===0?`<button class="btn btn-cancel" style="margin-top:0.6rem;padding:0.5rem;background:#FFF8E1;color:#F57F17;border:1px solid #FFE082;border-radius:10px;cursor:pointer;" onclick="cancelRequest('${r.id}')">Cancel Request</button>`:''}</div>`).join(''); } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load</div></div>'; } }
window.cancelRequest = async function(id) { const ok=await showConfirm('Cancel Request?','This cannot be undone'); if(!ok) return; showLoading('Cancelling...'); try { await updateDoc(doc(db,'ride_requests',id),{status:5}); showToast('Request cancelled','success'); renderMyRequests(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };

function getWeekKey() { const now=new Date(); const monday=new Date(now); monday.setDate(now.getDate()-now.getDay()+1); const week=Math.ceil((monday-new Date(monday.getFullYear(),0,1))/86400000/7); return `${monday.getFullYear()}-W${week}`; }
async function renderGameHub() { const el=document.getElementById('gamehub-content'); try { const scoresSnap=await getDoc(doc(db,'game_scores',currentUser.uid)); const scores=scoresSnap.data()||{}; const totalPts=(scores.puzzle_weeklyPoints||0)+(scores.quiz_weeklyPoints||0)+(scores.tap_weeklyPoints||0); el.innerHTML=`<div class="face-banner"><div class="face-avatar">🏆</div><div><div class="face-name">Face of the Week</div><div class="face-score">Compete to be featured!</div></div></div><div class="score-summary"><div style="display:flex;justify-content:space-between;"><span>This Week's Points</span><span>${getWeekKey()}</span></div><div class="score-number">${totalPts} pts</div><div style="display:flex;justify-content:space-between;margin-top:12px;"><div><div style="color:#6A1B9A;font-size:10px;">PUZZLE</div><div style="font-weight:800;">${scores.puzzle_weeklyPoints||0}</div></div><div><div style="color:#1565C0;font-size:10px;">QUIZ</div><div style="font-weight:800;">${scores.quiz_weeklyPoints||0}</div></div><div><div style="color:#00897B;font-size:10px;">TAP</div><div style="font-weight:800;">${scores.tap_weeklyPoints||0}</div></div></div></div><div class="game-card" onclick="showScreen('puzzle')"><div style="display:flex;align-items:center;gap:16px;"><div style="width:52px;height:52px;background:rgba(255,255,255,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;">🧩</div><div><div style="font-weight:800;">Puzzle Game</div><div style="font-size:12px;">${scores.puzzle_weeklyPoints||0} pts this week</div></div></div></div><div class="game-card quiz" onclick="showScreen('quiz')"><div style="display:flex;align-items:center;gap:16px;"><div style="width:52px;height:52px;background:rgba(255,255,255,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;">❓</div><div><div style="font-weight:800;">Quiz Game</div><div style="font-size:12px;">${scores.quiz_weeklyPoints||0} pts this week</div></div></div></div><div class="game-card tap" onclick="showScreen('tap')"><div style="display:flex;align-items:center;gap:16px;"><div style="width:52px;height:52px;background:rgba(255,255,255,0.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;">👆</div><div><div style="font-weight:800;">Tap Challenge</div><div style="font-size:12px;">${scores.tap_weeklyPoints||0} pts this week</div></div></div></div>`; } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🎮</div><div class="empty-title">Game Hub</div><div class="empty-sub">Play games and earn points</div></div>'; } }
async function saveGameScore(gameType,score) { try { await setDoc(doc(db,'game_scores',currentUser.uid),{ [`${gameType}_weeklyPoints`]:FieldValue.increment(score), lastUpdated:serverTimestamp() },{merge:true}); const weekKey=getWeekKey(); await setDoc(doc(db,'game_leaderboard',`${gameType}_${weekKey}_${currentUser.uid}`),{ userId:currentUser.uid, userName:userData.name, gameType, points:FieldValue.increment(score), weekKey, updatedAt:serverTimestamp() },{merge:true}); showToast(`+${score} points!`,'success'); } catch(e){} }

async function loadPuzzle() { const el=document.getElementById('puzzle-content'); try { const imgSnap=await getDocs(query(collection(db,'puzzle_images'),where('isActive','==',true),limit(1))); puzzleImageUrl=imgSnap.docs[0]?.data()?.imageUrl||''; el.innerHTML=`<div class="card"><div class="card-title">3x3 Puzzle</div><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><span>Moves: <span id="puzzle-moves">0</span></span><span>Time: <span id="puzzle-time">00:00</span></span></div><div id="puzzle-grid" class="puzzle-grid" style="grid-template-columns:repeat(3,1fr);aspect-ratio:1/1;"></div><button class="btn btn-primary" style="margin-top:16px;" onclick="shufflePuzzle()">Shuffle</button><button class="btn btn-secondary" style="margin-top:8px;" onclick="showScreen('gamehub')">Back to Game Hub</button></div>`; initPuzzle(); } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🧩</div><div class="empty-title">Puzzle Game</div><button class="btn btn-primary" onclick="showScreen(\'gamehub\')">Back</button></div>'; } }
function initPuzzle() { puzzleTiles=[1,2,3,4,5,6,7,8,0]; shufflePuzzle(); }
function shufflePuzzle() { for(let i=puzzleTiles.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [puzzleTiles[i],puzzleTiles[j]]=[puzzleTiles[j],puzzleTiles[i]]; } puzzleMoves=0; puzzleSeconds=0; document.getElementById('puzzle-moves').textContent='0'; if(puzzleTimer) clearInterval(puzzleTimer); puzzleTimer=setInterval(()=>{ puzzleSeconds++; const m=Math.floor(puzzleSeconds/60); const s=puzzleSeconds%60; document.getElementById('puzzle-time').textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; },1000); renderPuzzleGrid(); }
function renderPuzzleGrid() { const grid=document.getElementById('puzzle-grid'); if(!grid) return; grid.innerHTML=''; for(let i=0;i<puzzleTiles.length;i++){ const tile=puzzleTiles[i]; const isEmpty=tile===0; const tileDiv=document.createElement('div'); tileDiv.className='puzzle-tile'+(isEmpty?' empty':''); tileDiv.style.aspectRatio='1/1'; tileDiv.style.display='flex'; tileDiv.style.alignItems='center'; tileDiv.style.justifyContent='center'; tileDiv.style.fontSize='24px'; if(!isEmpty){ tileDiv.textContent=tile.toString(); if(puzzleImageUrl){ tileDiv.style.backgroundImage=`url(${toDirectImgUrl(puzzleImageUrl)})`; tileDiv.style.backgroundSize='300% 300%'; const row=Math.floor((tile-1)/3); const col=(tile-1)%3; tileDiv.style.backgroundPosition=`${col*50}% ${row*50}%`; tileDiv.style.backgroundRepeat='no-repeat'; tileDiv.textContent=''; } } tileDiv.onclick=()=>movePuzzleTile(i); grid.appendChild(tileDiv); } }
function movePuzzleTile(idx) { const emptyIdx=puzzleTiles.indexOf(0); const row=Math.floor(idx/3), col=idx%3; const emptyRow=Math.floor(emptyIdx/3), emptyCol=emptyIdx%3; if((Math.abs(row-emptyRow)+Math.abs(col-emptyCol))===1){ [puzzleTiles[idx],puzzleTiles[emptyIdx]]=[puzzleTiles[emptyIdx],puzzleTiles[idx]]; puzzleMoves++; document.getElementById('puzzle-moves').textContent=puzzleMoves; renderPuzzleGrid(); if(puzzleTiles.every((v,i)=>v===i+1 || (i===8 && v===0))){ clearInterval(puzzleTimer); const score=Math.floor(1000*(60/puzzleSeconds)); saveGameScore('puzzle',score); showToast(`Puzzle solved! Score: ${score} pts`,'success'); } } }
window.shufflePuzzle = shufflePuzzle;

async function loadQuiz() { const el=document.getElementById('quiz-content'); try { const qSnap=await getDocs(query(collection(db,'game_questions'),where('isActive','==',true))); quizQuestions=qSnap.docs.map(d=>({id:d.id,...d.data()})).sort(()=>0.5-Math.random()).slice(0,10); if(quizQuestions.length===0){ el.innerHTML='<div class="empty-state"><div class="empty-icon">❓</div><div class="empty-title">No questions yet</div><button class="btn btn-primary" onclick="showScreen(\'gamehub\')">Back</button></div>'; return; } quizIndex=0; quizScore=0; renderQuizQuestion(); } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">❓</div><div class="empty-title">Quiz Game</div><button class="btn btn-primary" onclick="showScreen(\'gamehub\')">Back</button></div>'; } }
function renderQuizQuestion() { const el=document.getElementById('quiz-content'); if(quizIndex>=quizQuestions.length){ saveGameScore('quiz',quizScore); el.innerHTML=`<div class="card"><div class="success-icon">🎉</div><div class="success-title">Quiz Complete!</div><div class="success-msg">You scored ${quizScore} points</div><button class="btn btn-primary" onclick="loadQuiz()">Play Again</button><button class="btn btn-secondary" style="margin-top:8px;" onclick="showScreen('gamehub')">Back</button></div>`; return; } const q=quizQuestions[quizIndex]; const options=q.type!=='tf'?q.options:['True','False']; let timeLeft=20; el.innerHTML=`<div class="card"><div class="quiz-timer"><div class="quiz-timer-fill" id="quiz-timer-fill" style="width:100%;"></div></div><div style="font-size:18px;font-weight:700;margin-bottom:16px;">${q.question}</div><div id="quiz-options">${options.map(opt=>`<div class="quiz-option" onclick="selectQuizAnswer('${opt.replace(/'/g,"\\'")}')">${opt}</div>`).join('')}</div><div style="margin-top:16px;">Question ${quizIndex+1}/${quizQuestions.length}</div></div>`; const timerFill=document.getElementById('quiz-timer-fill'); const interval=setInterval(()=>{ timeLeft--; if(timerFill) timerFill.style.width=`${(timeLeft/20)*100}%`; if(timeLeft<=0){ clearInterval(interval); selectQuizAnswer(null); } },1000); window.quizTimerInterval=interval; }
window.selectQuizAnswer = function(answer) { if(window.quizTimerInterval) clearInterval(window.quizTimerInterval); if(answer!==null){ const q=quizQuestions[quizIndex]; if(answer===q.answer) quizScore+=10; } quizIndex++; renderQuizQuestion(); };

function startTapChallenge() { const container=document.getElementById('tap-content'); tapScore=0; tapTimeLeft=30; tapGameActive=true; container.innerHTML=`<div style="position:relative;width:100%;height:500px;background:#0A1A14;border-radius:20px;overflow:hidden;"><div style="position:absolute;top:10px;left:16px;right:16px;display:flex;justify-content:space-between;"><div style="background:rgba(0,200,83,0.2);padding:8px 14px;border-radius:10px;"><span style="color:#00C853;font-weight:800;">Taps: <span id="tap-count">0</span></span></div><div style="background:rgba(255,215,0,0.2);padding:8px 14px;border-radius:10px;"><span style="color:#FFD700;font-weight:800;">Score: <span id="tap-score">0</span></span></div><div style="background:rgba(255,255,255,0.1);padding:8px 14px;border-radius:10px;"><span style="color:white;font-weight:800;"><span id="tap-time">30</span>s</span></div></div><div id="tap-target" style="position:absolute;left:100px;top:200px;width:72px;height:72px;background:radial-gradient(circle,#69F0AE,#00897B);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 20px rgba(0,137,123,0.6);"><span style="font-size:28px;">👆</span></div></div>`; const target=document.getElementById('tap-target'); target.onclick=()=>{ if(!tapGameActive) return; const pts=tapTimeLeft<10?8:tapTimeLeft<20?5:3; tapScore+=pts; document.getElementById('tap-count').textContent=parseInt(document.getElementById('tap-count').textContent)+1; document.getElementById('tap-score').textContent=tapScore; const maxX=container.clientWidth-72; const maxY=500-72; target.style.left=Math.random()*maxX+'px'; target.style.top=Math.random()*maxY+'px'; }; if(tapTimerInterval) clearInterval(tapTimerInterval); tapTimerInterval=setInterval(()=>{ if(!tapGameActive) return; tapTimeLeft--; document.getElementById('tap-time').textContent=tapTimeLeft; if(tapTimeLeft<=0){ clearInterval(tapTimerInterval); clearInterval(tapMoveInterval); tapGameActive=false; saveGameScore('tap',tapScore); showToast(`Tap Challenge complete! Score: ${tapScore} pts`,'success'); showScreen('gamehub'); } },1000); if(tapMoveInterval) clearInterval(tapMoveInterval); tapMoveInterval=setInterval(()=>{ if(!tapGameActive) return; const maxX=container.clientWidth-72; const maxY=500-72; target.style.left=Math.random()*maxX+'px'; target.style.top=Math.random()*maxY+'px'; },800); }

async function loadLeaderboard(gameType) { const el=document.getElementById('leaderboard-content'); try { const weekKey=getWeekKey(); const q=query(collection(db,'game_leaderboard'),where('gameType','==',gameType),where('weekKey','==',weekKey)); const snap=await getDocs(q); const entries=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.points||0)-(a.points||0)); if(entries.length===0){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-title">No scores yet</div></div>'; return; } const top3=entries.slice(0,3); const rest=entries.slice(3); let podiumHtml='<div class="leaderboard-podium">'; ['🥇','🥈','🥉'].forEach((medal,i)=>{ if(top3[i]) podiumHtml+=`<div class="podium-item"><div class="podium-avatar">${medal}</div><div class="podium-rank">#${i+1}</div><div class="podium-name">${top3[i].userName||'User'}</div><div class="podium-score">${top3[i].points} pts</div></div>`; }); podiumHtml+='</div>'; let restHtml='<div class="section-title">Other Players</div>'; rest.forEach((e,idx)=>{ restHtml+=`<div class="list-item"><div class="list-item-row"><div><div class="list-item-title">${e.userName||'User'}</div><div class="list-item-sub">#${idx+4} · ${e.points} pts</div></div></div></div>`; }); el.innerHTML=podiumHtml+restHtml; } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-title">Leaderboard</div></div>'; } }
window.showLeaderboard = function(gameType) { window.currentLeaderboardGame=gameType; document.getElementById('leaderboard-title').textContent=gameType==='puzzle'?'Puzzle Leaderboard':gameType==='quiz'?'Quiz Leaderboard':'Tap Leaderboard'; showScreen('leaderboard'); };

async function renderLostFound() { const el=document.getElementById('lostfound-content'); try { const snap=await getDocs(collection(db,'lost_found')); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)); if(docs.length===0){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No reports yet</div><div style="display:flex;gap:0.75rem;margin-top:1rem"><button class="btn btn-primary" style="flex:1;" onclick="showLostFoundForm(\'lost\')">Report Lost</button><button class="btn" style="flex:1;background:#E8F5E9;color:var(--success);border:1px solid #A5D6A7;" onclick="showLostFoundForm(\'found\')">Report Found</button></div></div>'; return; } el.innerHTML=`<div style="display:flex;gap:0.75rem;margin-bottom:1rem"><button class="btn btn-primary" style="flex:1;" onclick="showLostFoundForm('lost')">Report Lost</button><button class="btn" style="flex:1;background:#E8F5E9;color:var(--success);border:1px solid #A5D6A7;" onclick="showLostFoundForm('found')">Report Found</button></div><div class="section-title">Recent Reports</div>`+docs.map(r=>{ let imgHtml=''; if(r.imageUrl){ const url=toDirectImgUrl(r.imageUrl); imgHtml=`<img src="${url}" class="lf-image" onerror="this.style.display='none'">`; } return `<div class="list-item" style="padding:0;overflow:hidden;">${imgHtml?`<div style="position:relative;">${imgHtml}<div style="position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(0,0,0,0.5));"></div></div>`:''}<div style="padding:0.9rem 1rem;"><div class="list-item-row"><div><div class="list-item-title">${r.itemName||''}</div><div class="list-item-sub">${r.description||''}</div><div class="list-item-sub">📍 ${r.location||''} · ${formatTime(r.createdAt)}</div><div class="list-item-sub">👤 ${r.contactName||userData?.name||''}</div></div>${statusBadge(r.type)}</div></div></div>`; }).join(''); } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load</div></div>'; } }
let lfType='lost'; window.showLostFoundForm = function(type) { lfType=type; document.getElementById('lf-modal-title').textContent=type==='lost'?'Report Lost Item':'Report Found Item'; ['lf-item','lf-desc','lf-location','lf-image'].forEach(id=>{ const inp=document.getElementById(id); if(inp) inp.value=''; }); openModal('lostfound'); };
window.submitLostFound = async function() { const item=document.getElementById('lf-item').value.trim(); if(!item){ showToast('Please enter item name','error'); return; } showLoading('Submitting...'); try { await addDoc(collection(db,'lost_found'),{ type:lfType, itemName:item, description:document.getElementById('lf-desc').value.trim(), location:document.getElementById('lf-location').value.trim(), imageUrl:document.getElementById('lf-image').value.trim(), contactName:userData.name, userId:currentUser.uid, createdAt:serverTimestamp() }); closeModal('lostfound'); showToast('Report submitted!','success'); renderLostFound(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };

async function renderReport() { const el=document.getElementById('report-content'); el.innerHTML=`<div class="card"><div class="card-title">Subject</div><input class="form-input" id="report-subject" placeholder="Brief description"/></div><div class="card"><div class="card-title">Message</div><textarea class="form-input" id="report-message" placeholder="Describe the issue..."></textarea></div><button class="btn btn-primary" onclick="submitReport()">Send Report</button><div class="section-title">My Previous Reports</div><div id="reports-list"><div class="empty-state"><div class="loading-spinner"></div></div></div>`; try { const q=query(collection(db,'complaints'),where('userId','==',currentUser.uid)); const snap=await getDocs(q); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)); if(docs.length===0){ document.getElementById('reports-list').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">No reports yet</div></div>'; return; } document.getElementById('reports-list').innerHTML=docs.map(r=>`<div class="list-item"><div class="list-item-row"><div><div class="list-item-title">${r.subject||''}</div><div class="list-item-sub">${(r.message||'').slice(0,60)}</div>${r.adminReply?`<div class="list-item-sub" style="color:var(--primary);">Admin: ${r.adminReply}</div>`:''}</div>${statusBadge(r.status)}</div></div>`).join(''); } catch(e){ document.getElementById('reports-list').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load</div></div>'; } }
window.submitReport = async function() { const subject=document.getElementById('report-subject').value.trim(); const message=document.getElementById('report-message').value.trim(); if(!subject||!message){ showToast('Fill all fields','error'); return; } showLoading('Submitting...'); try { await addDoc(collection(db,'complaints'),{ userId:currentUser.uid, userName:userData.name, subject, message, status:'open', adminReply:'', platform:'pwa', createdAt:serverTimestamp() }); document.getElementById('report-subject').value=''; document.getElementById('report-message').value=''; showToast('Report submitted!','success'); renderReport(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };

async function renderNotifications() { const el=document.getElementById('notifications-content'); try { const q=query(collection(db,'notifications'),where('userId','==',currentUser.uid)); const snap=await getDocs(q); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)); if(docs.length===0){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-title">No notifications</div><div class="empty-sub">You\'re all caught up</div></div>'; return; } el.innerHTML=docs.map(n=>`<div class="notif-item ${n.read?'':'notif-unread'}" style="display:flex;gap:0.75rem;padding:1rem;background:${n.read?'white':'#F0F4FF'};border-radius:14px;margin-bottom:0.6rem;border:1px solid var(--border);cursor:pointer;" onclick="markRead('${n.id}')"><div class="notif-dot ${n.read?'read':''}" style="width:9px;height:9px;border-radius:50%;background:${n.read?'transparent':'var(--primary)'};margin-top:0.35rem;"></div><div><div class="notif-title" style="font-weight:600;">${n.title||'Notification'}</div><div class="notif-body" style="font-size:0.78rem;color:var(--text-muted);">${n.body||''}</div><div class="notif-time" style="font-size:0.7rem;color:var(--text-muted);margin-top:0.3rem;">${formatTime(n.createdAt)}</div></div></div>`).join(''); } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load</div></div>'; } }
window.markRead = async function(id) { try { await updateDoc(doc(db,'notifications',id),{read:true}); renderNotifications(); } catch(e){} };
window.markAllRead = async function() { showLoading('Marking...'); try { const q=query(collection(db,'notifications'),where('userId','==',currentUser.uid),where('read','==',false)); const snap=await getDocs(q); const batch=writeBatch(db); snap.docs.forEach(d=>batch.update(d.ref,{read:true})); await batch.commit(); renderNotifications(); showToast('All marked as read','success'); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };
window.switchNotifTab = function(tab) { const notifContent=document.getElementById('notifications-content'); const chatPanel=document.getElementById('chat-panel'); const tabNotifs=document.getElementById('tab-notifs'); const tabChat=document.getElementById('tab-chat'); if(tab==='notifs'){ notifContent.style.display='block'; chatPanel.style.display='none'; tabNotifs.style.color='var(--primary)'; tabNotifs.style.borderBottomColor='var(--primary)'; tabChat.style.color='var(--text-muted)'; tabChat.style.borderBottomColor='transparent'; renderNotifications(); } else { notifContent.style.display='none'; chatPanel.style.display='flex'; tabChat.style.color='var(--primary)'; tabChat.style.borderBottomColor='var(--primary)'; tabNotifs.style.color='var(--text-muted)'; tabNotifs.style.borderBottomColor='transparent'; loadChat(); } };
function loadChat() { const el=document.getElementById('chat-messages'); if(chatUnsub) chatUnsub(); const q=query(collection(db,'chats',currentUser.uid,'messages')); chatUnsub=onSnapshot(q, snap=>{ const msgs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)); if(msgs.length===0){ el.innerHTML='<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">No messages yet</div><div class="empty-sub">Start a conversation with admin</div></div>'; return; } let lastDate=''; el.innerHTML=msgs.map(m=>{ const mine=m.senderId===currentUser.uid; const d=m.createdAt?.toDate?m.createdAt.toDate():new Date(); const dateStr=d.toLocaleDateString(); const timeStr=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); let divider=dateStr!==lastDate?`<div class="chat-day-divider" style="text-align:center;font-size:0.72rem;color:var(--text-muted);margin:0.75rem 0;">${dateStr}</div>`:''; if(dateStr!==lastDate) lastDate=dateStr; return `${divider}<div class="chat-wrap ${mine?'mine':'theirs'}" style="display:flex;flex-direction:column;margin-bottom:0.75rem;${mine?'align-items:flex-end':'align-items:flex-start'}">${!mine?`<div class="chat-sender" style="font-size:0.72rem;font-weight:700;margin-bottom:0.2rem;color:var(--primary);">${m.senderName||'Admin'}</div>`:''}<div class="chat-bubble ${mine?'mine':'theirs'}" style="max-width:78%;padding:0.65rem 0.9rem;border-radius:18px;margin-bottom:0.5rem;font-size:0.88rem;${mine?'background:var(--primary);color:white;border-radius:18px 18px 4px 18px;margin-left:auto;':'background:white;color:var(--text-primary);border:1px solid var(--border);border-radius:18px 18px 18px 4px;margin-right:auto;'}">${m.text||''}<div class="chat-meta" style="font-size:0.65rem;opacity:0.7;margin-top:0.25rem;">${timeStr}</div></div></div>`; }).join(''); el.scrollTop=el.scrollHeight; }); }
window.sendChatMessage = async function() { const input=document.getElementById('chat-input'); const text=input.value.trim(); if(!text) return; input.value=''; try { await addDoc(collection(db,'chats',currentUser.uid,'messages'),{ senderId:currentUser.uid, senderName:userData.name, senderRole:userData.role||'user', text, createdAt:serverTimestamp() }); } catch(e){ showToast('Failed to send','error'); input.value=text; } };

async function loadDriverRequests() { const el=document.getElementById('driver-requests'); try { const q=query(collection(db,'ride_requests'),where('status','==',0)); const snap=await getDocs(q); const docs=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0)); if(docs.length===0){ el.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">No pending requests</div></div>'; return; } el.innerHTML=docs.map(r=>`<div class="driver-request-card"><div class="driver-route">${r.pickupLocation||''} → ${r.destination||''}</div><div class="driver-meta"><span class="driver-chip">ID: ${r.pickupId||'-'}</span><span class="driver-chip">${r.rideType||''}</span><span class="driver-chip">${r.passengerCount||1} pax</span><span class="driver-chip">${r.userName||'-'}</span></div><div style="display:flex;gap:0.5rem;margin-top:0.75rem;"><button class="btn btn-success" style="flex:1;padding:0.6rem;background:var(--success);color:white;border:none;border-radius:12px;cursor:pointer;" onclick="updateRequestStatus('${r.id}',1)">Accept</button><button class="btn btn-danger" style="flex:1;padding:0.6rem;background:var(--danger);color:white;border:none;border-radius:12px;cursor:pointer;" onclick="updateRequestStatus('${r.id}',4)">Reject</button></div></div>`).join(''); } catch(e){ el.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load</div></div>'; } }
window.updateRequestStatus = async function(id,status) { showLoading('Updating...'); try { await updateDoc(doc(db,'ride_requests',id),{ status, statusName:status===1?'Assigned':'Rejected', shuttleIdFeedback:userData.shuttleId||'AFIT-001' }); showToast(status===1?'Accepted!':'Rejected',status===1?'success':'error'); loadDriverRequests(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };
function startIntentListener(driverId) { if(intentUnsub) intentUnsub(); const q=query(collection(db,'driver_intents'),where('driverId','==',driverId),where('status','==','pending_intent')); intentUnsub=onSnapshot(q, snap=>{ const intents=snap.docs.map(d=>({id:d.id,...d.data()})); const container=document.getElementById('driver-intents-container'); if(!container) return; if(intents.length===0){ container.innerHTML=''; return; } container.innerHTML=intents.map(i=>`<div class="intent-banner"><div class="intent-badge"><span class="intent-dot"></span>NEW REQUEST</div><div class="driver-route">${i.pickupLocation||''} → ${i.destination||''}</div><div class="driver-meta"><span class="driver-chip">${i.rideType||''}</span><span class="driver-chip">${i.passengerCount||1} pax</span><span class="driver-chip">${i.userName||''}</span></div><div style="display:flex;gap:0.5rem;margin-top:0.75rem;"><button class="intent-reject" style="flex:1;padding:0.7rem;border:1px solid rgba(255,255,255,0.3);border-radius:12px;background:transparent;color:white;font-weight:600;cursor:pointer;" onclick="rejectIntent('${i.id}')">Reject</button><button class="intent-accept" style="flex:2;padding:0.7rem;border:none;border-radius:12px;background:white;color:#1B5E20;font-weight:800;cursor:pointer;" onclick="acceptIntent('${i.id}')">Accept</button></div></div>`).join(''); }); }
window.acceptIntent = async function(intentId) { showLoading('Accepting...'); try { const intentSnap=await getDoc(doc(db,'driver_intents',intentId)); const intent=intentSnap.data(); if(!intent) return; const batch=writeBatch(db); batch.update(doc(db,'driver_intents',intentId),{status:'accepted',acceptedAt:serverTimestamp()}); if(intent.requestId){ batch.update(doc(db,'ride_requests',intent.requestId),{ status:1, statusName:'Assigned', driverId:currentUser.uid, driverName:userData.name, shuttleIdFeedback:userData.shuttleId||'AFIT-001', assignedAt:serverTimestamp() }); } await batch.commit(); showToast('Request accepted!','success'); loadDriverRequests(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };
window.rejectIntent = async function(intentId) { showLoading('Rejecting...'); try { await updateDoc(doc(db,'driver_intents',intentId),{status:'rejected',rejectedAt:serverTimestamp()}); showToast('Request rejected',''); loadDriverRequests(); } catch(e){ showToast('Failed','error'); } finally { hideLoading(); } };
